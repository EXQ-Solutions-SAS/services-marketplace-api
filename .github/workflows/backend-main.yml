name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: exq-solutions-dev
  REGION: us-central1
  SERVICE_NAME: exq-nestjs-api
  REPOSITORY: exq-repo

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- FASE 1: CI (Ejecución real) ---
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Linting
      run: npm run lint || echo "No lint script found, skipping..."

    - name: Docker Build Check (Dry Run)
      run: docker build -t backend-test . 
      # Esto valida que el Dockerfile es correcto y que la imagen se puede construir.

